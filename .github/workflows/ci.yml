name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-node:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm run build --workspaces --if-present
      - run: npm test
      - name: Coverage
        run: npm run test:coverage --workspaces --if-present

  test-bun:
    name: Bun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # Build core first so @airlock/fetch's runtime import of @airlock/core
      # resolves via the dist/ exports condition under bun.
      - run: (cd packages/core && bun run build)
      - run: (cd packages/fetch && bun run build)
      - name: Test with bun
        run: |
          for d in packages/core packages/fetch; do
            (cd "$d" && bun test test/*.test.ts)
          done

  test-deno:
    name: Deno
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Deno resolves .js relative imports to .ts with this flag. The core
      # engine is the zero-dep isomorphic package we care about here.
      - name: Typecheck core with Deno
        run: |
          (cd packages/core && deno check --unstable-sloppy-imports src/index.ts)
      - name: Run core tests with Deno
        run: |
          (cd packages/core && deno test --unstable-sloppy-imports --allow-read --allow-env test/core.test.ts)

  publish:
    name: Publish to npm
    needs: [test-node, test-bun, test-deno]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      # Build in dependency order: core -> fetch -> umbrella.
      - run: npm run build --workspace @airlock/core
      - run: npm run build --workspace @airlock/fetch
      - run: npm run build --workspace @airlock/airlock
      # Publish in dependency order so the umbrella can resolve its deps.
      - name: Publish @airlock/core
        run: npm publish --access public --provenance
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @airlock/fetch
        run: npm publish --access public --provenance
        working-directory: packages/fetch
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @airlock/airlock
        run: npm publish --access public --provenance
        working-directory: packages/airlock
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
